name: CI - MC/DC Test Suite

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build, Run MC/DC Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn compile --batch-mode

      - name: Run MC/DC Test Suite + Generate Coverage Report
        run: mvn test jacoco:report --batch-mode

      - name: Verify Minimum 80% Branch Coverage
        run: mvn jacoco:check --batch-mode

      - name: Upload JaCoCo HTML Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 30

      - name: Upload Surefire Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-results
          path: target/surefire-reports/
          retention-days: 30
